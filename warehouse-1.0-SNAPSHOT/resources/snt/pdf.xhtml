<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:p="http://primefaces.org/ui">

    <!-- INTERFACE -->
    <cc:interface>
        <cc:attribute name="id"/>
        <cc:attribute name="value"/>
        <cc:attribute name="disabled"/>
    </cc:interface>

    <!-- IMPLEMENTATION -->
    <cc:implementation>
        <p:commandLink id="#{cc.attrs.id}" title="#{msgs.pdf}" disabled="#{cc.attrs.disabled}" style="vertical-align: middle"
                       ajax="false" onclick="PrimeFaces.monitorDownload(start, stop)">  
            <p:graphicImage value="/resources/images/pdf.png" height="20" width="20" style="vertical-align: text-bottom"/> 
            <p:fileDownload value="#{cc.attrs.value}" /> 
        </p:commandLink>  
    </cc:implementation>
</html>
