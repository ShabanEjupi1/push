<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core">

    <!-- INTERFACE -->
    <cc:interface>
        <cc:attribute name="id"/>
        <cc:attribute name="value" required="true" />
        <cc:attribute name="label" type="java.lang.String"/>
        <cc:attribute name="title" type="java.lang.String"/>
        <cc:attribute name="required" type="java.lang.Boolean" default="false"/>
        <cc:attribute name="disabled" type="java.lang.Boolean" default="false"/>
        <cc:attribute name="showTime" type="java.lang.Boolean" default="false"/>
        <cc:attribute name="tabindex" />
        <cc:attribute name="maxDate" />
        <cc:attribute name="navigator" type="java.lang.Boolean" default="false"/>
    </cc:interface>

    <!-- IMPLEMENTATION -->
    <cc:implementation>
        <p:calendar value="#{cc.attrs.value}" 
                    label="#{cc.attrs.label}"
                    title="#{cc.attrs.title}"
                    pattern="#{cc.attrs.showTime ? dateTimePattern : datePattern}" 
                    size="#{cc.attrs.showTime ? 14 : 10}" 
                    id="#{cc.attrs.id}"
                    timeZone="#{timezone}"
                    required="#{cc.attrs.required}"
                    disabled="#{cc.attrs.disabled}"
                    styleClass="column_right"
                    tabindex="#{cc.attrs.tabindex}"
                    maxdate="#{cc.attrs.maxDate}"
                    navigator="#{cc.attrs.navigator}">
            <f:ajax execute="@this" render="@this"/>
        </p:calendar>
    </cc:implementation>
</html>
