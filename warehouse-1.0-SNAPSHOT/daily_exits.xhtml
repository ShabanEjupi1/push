<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:snt="http://java.sun.com/jsf/composite/snt"
                template="/WEB-INF/templates/auth_template.xhtml">

    <ui:define name="content">
        <f:event type="preRenderView" listener="#{dailyExitsBean.init()}"/>
        <p:panel header="#{msgs.daily_exits}">
            <h:form id="dailyExitsForm">
                <p:blockUI block="dailyExitsForm:results" trigger="dailyExitsForm:results">  
                    LOADING<br />  
                    <p:graphicImage value="/resources/images/ajax-loader.gif"/>  
                </p:blockUI>
                <!-- Search panel -->
                <p:panel id="searchPanel">

                    <h:panelGrid columns="3" style="margin-left: 208px;" rendered="#{dailyExitsBean.storn}">
                        <h:outputText value="#{msgs.traderFiscalNumber}" />
                        <p:autoComplete value="#{dailyExitsBean.trader}"
                                        completeMethod="#{dailyExitsBean.completeTrader}"  
                                        var="t" itemLabel="#{t.fiscalNumber}" itemValue="#{t}" 
                                        converter="traderConverter" size="10"
                                        forceSelection="true" dropdown="true" minQueryLength="3">  
                            <p:ajax event="itemSelect" listener="#{dailyExitsBean.onSelectTrader}" 
                                    update=":dailyExitsForm:traderPanel" process="@this"/>  
                            <p:column width="30">#{t.fiscalNumber}</p:column> 
                            <p:column width="150">#{t.name}</p:column>
                        </p:autoComplete> 
                        <h:panelGroup id="traderPanel">
                            <p:inputText value="#{dailyExitsBean.trader.display}" disabled="true" size="100"/>
                        </h:panelGroup>
                    </h:panelGrid>                    

                    <h:panelGrid columns="8" cellspacing="5" cellpadding="5" style="margin-left: 100px;" columnClasses="column_right_bold, column_left, column_right_bold, column_left, column_right_bold, column_left, column_right_bold, column_left, column_right_bold, column_left,column_right_bold, column_left" >

                        <h:outputText value="#{msgs.registrationDate}"/>
                        <snt:calendar value="#{dailyExitsBean.filter.registrationDate}" label="#{msgs.registrationDate}"/>

                        <h:outputText value="#{msgs.registerNumber}"/>
                        <p:inputText value="#{dailyExitsBean.filter.registerNumber}" label="#{msgs.registerNumber}"/>                            

                        <h:outputText value="#{msgs.officeName}"/>
                        <p:inputText value="#{dailyExitsBean.filter.officeName}" label="#{msgs.officeName}"/>

                        <h:outputText value="#{msgs.sadItemNbr}"/>
                        <p:inputText value="#{dailyExitsBean.filter.sadItemNbr}" label="#{msgs.sadItemNbr}"/>

                        <h:outputText value="#{msgs.tariff}"/>
                        <p:inputText value="#{dailyExitsBean.filter.tariff}" label="#{msgs.tariff}"/>

                        <h:outputText value="#{msgs.countryOfOrigin}"/>
                        <p:inputText value="#{dailyExitsBean.filter.countryOfOrigin}" label="#{msgs.countryOfOrigin}" />

                        <h:outputText value="#{msgs.goodsDescription}"/>
                        <p:inputText value="#{dailyExitsBean.filter.goodsDescription}" label="#{msgs.goodsDescription}" /> 

                        <h:outputText value="#{msgs.status}"/>
                        <p:selectOneMenu value="#{dailyExitsBean.filter.status}"
                                         converter="omnifaces.GenericEnumConverter">
                            <f:selectItem itemValue="#{null}" itemLabel="" />
                            <f:selectItems value="#{dailyExitsBean.statuses}" var="s" itemValue="#{s}" itemLabel="#{msgs[s]}"/>
                        </p:selectOneMenu>

                        <h:outputText value="#{msgs.exitDate}"/>
                        <h:panelGrid columns="3">
                            <snt:calendar value="#{dailyExitsBean.filter.exitDateFrom}" label="#{msgs.exitDateFrom}"/>
                            <h:outputText value="-"/>
                            <snt:calendar value="#{dailyExitsBean.filter.exitDateTo}" label="#{msgs.exitDateTo}"/>
                        </h:panelGrid>

                        <h:outputText value="#{msgs.exitReference}"/>
                        <p:inputText value="#{dailyExitsBean.filter.exitReference}" label="#{msgs.exitReference}" /> 

                    </h:panelGrid>

                    <f:facet name="footer">
                        <h:panelGrid columns="3">
                            <p:commandButton icon="ui-icon-search" title="#{msgs.search}" action="#{dailyExitsBean.search()}" 
                                             process="searchPanel" update="@form"
                                             onstart="wTable.getPaginator().setPage(0);"/>
                            <p:commandButton icon="ui-icon-close" title="#{msgs.cancel}" action="#{dailyExitsBean.cancel()}" 
                                             immediate="true" process="searchPanel" update="@form">
                                <p:resetInput target="searchPanel" />
                            </p:commandButton>
                            <snt:ajaxStatus/>
                        </h:panelGrid>
                    </f:facet>

                </p:panel>

                <p:panel id="resultsPanel">

                    <!-- List of daily exits -->                
                    <p:dataTable id="results" value="#{dailyExitsBean.data}" 
                                 var="we" rows="10" widgetVar="wTable" lazy="true"
                                 paginator="true" paginatorPosition="bottom"
                                 rowStyleClass="warehouse_exit_#{we.status}"
                                 paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {CurrentPageReport} "
                                 currentPageReportTemplate="#{msgs.records_no} {totalRecords}">

                        <f:facet name="header">
                            <snt:pdf value="#{dailyExitsBean.pdfExits}" disabled="#{empty dailyExitsBean.data or dailyExitsBean.data.rowCount == 0}" 
                                     rendered="#{!dailyExitsBean.storn}"/>
                        </f:facet>

                        <p:column headerText="#{msgs.registerNumber}" style="text-align: left ;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.registerNumberDisplay}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.registrationDate}" style="text-align: left ;font-size: 9px !important;">  
                            <snt:outputDate value="#{we.warehouseInventory.registrationDate}"/>
                        </p:column>                       
                        <p:column headerText="#{msgs.sadItemNbr}" style="text-align: right ;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.sadItemNbr}" style="font-size: 9px !important;"/>
                        </p:column>                        
                        <p:column headerText="#{msgs.officeName}" style="text-align: left;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.officeName}" style="font-size: 9px !important;"/>
                        </p:column>  
                        <p:column headerText="#{msgs.tariff}" style="text-align: center;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.tariff}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.tscCode}" style="text-align: center;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.tscCode}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.goodsDescription}" style="text-align: left; max-width: 75px;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.goodsDescription}" style="font-size: 9px !important;"/>                       
                        </p:column>
                        <p:column headerText="#{msgs.origin}" style="text-align: left;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.countryOfOrigin}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.cefta}" style="text-align: left;font-size: 9px !important;">
                            <h:outputText value="#{we.warehouseInventory.tarPrf}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.exitDate}" sortBy="exitDate" style="font-size: 9px !important;">  
                            <snt:outputDate value="#{we.exitDate}"/>
                        </p:column> 
                        <p:column headerText="#{msgs.exitReference}" sortBy="exitReference" style="text-align: left;font-size: 9px !important;">
                            <h:outputText value="#{we.exitReference}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.status}" style="text-align: center;font-size: 9px !important;"
                                  sortBy="#{we.status}">
                            <h:outputText value="#{we.status == 'VALID' ? 'V' : 'S'}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.netWeightOut}" sortBy="netWeightOut" style="text-align: right;font-size: 9px !important;">
                            <snt:outputDecimal value="#{we.netWeightOut}"/>
                        </p:column>
                        <p:column headerText="#{msgs.grossWeightOut}" sortBy="grossWeightOut" style="text-align: right;font-size: 9px !important;">
                            <snt:outputDecimal value="#{we.grossWeightOut}"/>
                        </p:column>
                        <p:column headerText="#{msgs.quantityOut}" sortBy="quantityOut" style="text-align: right;font-size: 9px !important;">
                            <snt:outputDecimal value="#{we.quantityOut}"/>
                        </p:column>
                        <p:column headerText="#{msgs.note}" style="text-align: left;font-size: 9px !important;">
                            <h:outputText value="#{we.note}" style="font-size: 9px !important;"/>
                        </p:column>
                        <p:column headerText="#{msgs.comment}" style="text-align: left;font-size: 9px !important;">  
                            <h:outputText value="#{we.comment}" style="font-size: 9px !important;"/>
                        </p:column> 

                        <p:column rendered="#{sessionData.admin}">
                            <p:commandButton icon="ui-icon-circle-close"
                                             title="#{msgs.storn_exit}"
                                             action="#{dailyExitsBean.stornExit(we)}"
                                             disabled="#{we.storned}"
                                             update=":exitForm" process="@this"
                                             oncomplete="exitDlg.show();"
                                             style="width: 20px; height: 20px"/>
                        </p:column>
                    </p:dataTable>

                </p:panel>
            </h:form>

        </p:panel>
    </ui:define>

    <ui:define name="otherContent">
        <p:dialog widgetVar="exitDlg" header="#{msgs.stornWarehouseExitHeader}" closeOnEscape="false" closable="false"
                  modal="true">
            <h:form id="exitForm" onkeypress="if (event.which == 13)
                        event.preventDefault();">
                <p:outputPanel id="detailsPanel">

                    <h:outputText value="#{msgs.sureToStorn}" style="font-weight: bold; font-size: 14px !important; margin-left: 550px; color: #164397; margin-top: 100px !important;"/>

                    <p:panel>
                        <p:panelGrid styleClass="no_border_grid">
                            <p:row>
                                <p:column>
                                    <h:outputText value="#{msgs.registerNumber}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.registerNumberDisplay}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.tariff}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.tariff}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.netWeightOut}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <snt:inputDecimal value="#{dailyExitsBean.warehouseExit.netWeightOut}"
                                                      label="#{msgs.netWeightOut}"
                                                      disabled="true"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.remainingNetWeight}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column styleClass="column_right">
                                    <snt:inputDecimal value="#{dailyExitsBean.warehouseExit.warehouseInventory.remainingNetWeight}" disabled="true"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.exitReference}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <p:inputText value="#{dailyExitsBean.warehouseExit.exitReference}" maxlength="20" size="30"
                                                 disabled="true"
                                                 label="#{msgs.exitReference}">
                                        <p:ajax process="@this" update="@this"/>
                                        <f:validateLength maximum="20"/>
                                    </p:inputText>
                                </p:column>
                            </p:row>
                            <p:row>
                                <p:column>
                                    <h:outputText value="#{msgs.registrationDate}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <snt:outputDate value="#{dailyExitsBean.warehouseExit.warehouseInventory.registrationDate}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.countryOfOrigin}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.countryOfOrigin}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.quantityOut}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>                                   
                                    <snt:inputDecimal value="#{dailyExitsBean.warehouseExit.quantityOut}"
                                                      label="#{msgs.quantityOut}"
                                                      disabled="true"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.remainingQuantity}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column styleClass="column_right">
                                    <snt:inputDecimal value="#{dailyExitsBean.warehouseExit.warehouseInventory.remainingQuantity}" disabled="true"/>
                                </p:column>
                                <p:column rowspan="2">
                                    <h:outputText value="#{msgs.comment}*" style="font-weight: bold;"/>
                                </p:column>
                                <p:column rowspan="2">
                                    <p:inputTextarea value="#{dailyExitsBean.warehouseExit.comment}"
                                                     required="true"
                                                     label="#{msgs.comment}"
                                                     maxlength="100" rows="3" cols="50" autoResize="false">
                                        <f:validateLength maximum="100"/>
                                        <p:ajax process="@this" update="@this"/>
                                    </p:inputTextarea>
                                </p:column>
                            </p:row>
                            <p:row>
                                <p:column>
                                    <h:outputText value="#{msgs.sadItemNbr}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.sadItemNbr}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.officeCode}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.officeCode}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.stockValue}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <snt:inputDecimal value="#{dailyExitsBean.warehouseExit.stockValue}"
                                                      label="#{msgs.stockValue}"
                                                      disabled="true"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.measurementUnit}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <p:inputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.measurementUnit}" disabled="true" size="10"/>
                                </p:column>
                                <p:column>
                                </p:column>
                                <p:column>
                                </p:column>
                            </p:row>
                            <p:row>
                                <p:column colspan="2">
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.officeName}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.officeName}"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{msgs.grossWeightOut}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column>
                                    <snt:inputDecimal value="#{dailyExitsBean.warehouseExit.grossWeightOut}"
                                                      disabled="true"/>
                                </p:column>
                                <p:column>
                                </p:column>
                                <p:column>
                                </p:column>
                            </p:row>
                            <p:row>
                                <p:column>
                                    <h:outputText value="#{msgs.goodsDescription}" style="font-weight: bold;"/>
                                </p:column>
                                <p:column colspan="7">
                                    <h:outputText value="#{dailyExitsBean.warehouseExit.warehouseInventory.goodsDescription}"/>
                                </p:column>
                                <p:column>
                                </p:column>
                                <p:column>
                                </p:column>
                            </p:row>
                        </p:panelGrid>
                        <f:facet name="footer">
                            <p:commandButton icon="ui-icon-circle-check" title="#{msgs.storn_daily_exits}"                                              
                                             value="#{msgs.storn_daily_exits}"
                                             action="#{dailyExitsBean.stornExitAction()}"
                                             update=":dailyExitsForm"
                                             oncomplete="onSave(xhr, status, args)"/>
                            <p:commandButton icon="ui-icon-close" title="#{msgs.cancel}" 
                                             update=":dailyExitsForm"
                                             value="#{msgs.cancel}" immediate="true"
                                             action="#{dailyExitsBean.cancelStorning()}"
                                             oncomplete="exitDlg.hide()">
                            </p:commandButton>
                        </f:facet>
                    </p:panel>
                </p:outputPanel>
            </h:form>
        </p:dialog>
        <script type="text/javascript">
               function onSave(xhr, status, args) {
                   if (!args.validationFailed) {
                       exitDlg.hide();
                   }
               }
        </script>
    </ui:define>    

    <!-- Help Panel -->
    <ui:define name="helpContent">
        <p:panel header="#{msgs.home_help_header}">

            <p:panelGrid styleClass="no_border_grid">

                <p:row>
                    <p:column colspan="2">
                        <h:outputText value="#{msgs.daily_exits_help_1}"/>
                    </p:column>
                </p:row>
                <p:row>
                    <p:column colspan="2">
                        <h:outputText value="#{msgs.daily_exits_help_3}" style="font-weight: bold;"/>
                    </p:column>
                </p:row>
                <p:row>
                    <p:column>
                        <span class="ui-icon ui-icon-search ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="#{msgs.daily_exits_help_4}"/>
                    </p:column>
                </p:row>
                <p:row>
                    <p:column>
                        <span class="ui-icon ui-icon-close ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="#{msgs.daily_exits_help_5}"/>
                    </p:column>
                </p:row>

                <p:row rendered="#{dailyExitsBean.storn}">
                    <p:column colspan="2">
                        <h:outputText value="#{msgs.storn_help_actions}" style="font-weight: bold;"/>
                    </p:column>
                </p:row>

                <p:row rendered="#{dailyExitsBean.storn}">
                    <p:column>
                        <span class="ui-icon ui-icon-close ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="#{msgs.daily_exits_help_storn}"/>
                    </p:column>
                </p:row>

                <p:row rendered="#{dailyExitsBean.storn}">
                    <p:column>
                        <span class="ui-icon ui-icon-circle-check ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="#{msgs.daily_exits_help_storn_perform}"/>
                    </p:column>
                </p:row>

            </p:panelGrid>

            <!-- Common actions -->
            <ui:include src="help.xhtml"/>            

        </p:panel>
    </ui:define>

</ui:composition>
