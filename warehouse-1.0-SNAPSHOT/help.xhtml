<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <p:panelGrid rendered="#{sessionData.admin}">

        <p:row>
            <p:column colspan="2">
                <h:outputText value="#{msgs.admin_help_menu_actions}" style="font-weight: bold;"/>
            </p:column>
        </p:row>
        <p:row>
            <p:column>
                <h:outputText value="#{msgs.users}" style="font-weight: bold;"/>
            </p:column>
            <p:column>
                <h:outputText value="- #{msgs.admin_help_users}"/>
            </p:column>
        </p:row>
        <p:row>
            <p:column>
                <h:outputText value="#{msgs.audit_log}" style="font-weight: bold;"/>
            </p:column>
            <p:column>
                <h:outputText value="- #{msgs.admin_audit_log}"/>
            </p:column>
        </p:row>
        <p:row rendered="#{dailyExitsBean.storn}">
            <p:column>
                <span class="ui-icon ui-icon-circle-close ui-corner-all ui-state-default"/>
            </p:column>
            <p:column>
                <h:outputText value="- #{msgs.admin_storn}"/>
            </p:column>
        </p:row>

    </p:panelGrid>

    <!-- Common help -->
    <p:panelGrid>

        <p:row>
            <p:column colspan="2">
                <h:outputText value="#{msgs.help_commonActions}" style="font-weight: bold;"/>
            </p:column>
        </p:row>

        <p:row>
            <p:column>
                <span class="ui-icon ui-icon-person ui-corner-all ui-state-default"/>
            </p:column>
            <p:column>
                <h:outputText value="- #{msgs.admin_user_profile}"/>
            </p:column>
        </p:row>
        <p:row>
            <p:column>
                <span class="ui-icon ui-icon-home ui-corner-all ui-state-default"/>
            </p:column>
            <p:column>
                <h:outputText value="- #{msgs.admin_home_help}"/>
            </p:column>
        </p:row>
        <p:row>
            <p:column>
                <span class="ui-icon   ui-icon-power ui-corner-all ui-state-default"/>
            </p:column>
            <p:column>
                <h:outputText value="- #{msgs.admin_logout_help}"/>
            </p:column>
        </p:row>

    </p:panelGrid>

</html>
