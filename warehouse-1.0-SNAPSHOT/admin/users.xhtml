<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/auth_template.xhtml"
                xmlns:snt="http://java.sun.com/jsf/composite/snt">
    <ui:define name="title">#{msgs.users}</ui:define>
    <ui:define name="headerTitle">
        <snt:headerTitle value="#{msgs.users}"/>
    </ui:define>
    <ui:define name="content">
        <f:event type="preRenderView" listener="${usersBean.init()}"/>
        <p:panel header="#{msgs.user}" toggleable="true">
            <h:form id="userForm">
                <h:panelGrid columns="2" columnClasses="column_right_bold, column_left" id="itemPanel">
                    <h:outputText value="#{msgs.login_username}"/>
                    <p:inputText value="#{usersBean.user.username}" label="#{msgs.login_username}"
                                 disabled="#{usersBean.edit}"/>
                    <h:outputText value="#{msgs.user_name}"/>
                    <p:inputText value="#{usersBean.user.name}" label="#{msgs.user_name}"/>
                    <h:outputText value="#{msgs.user_admin}"/>
                    <p:selectBooleanCheckbox value="#{usersBean.user.administrator}"
                                             disabled="#{usersBean.edit}">
                        <p:ajax listener="#{usersBean.onChangeAdmin}" process="itemPanel" update="itemPanel"/>
                    </p:selectBooleanCheckbox>
                    <h:outputText value="#{msgs.user_language}"/>
                    <p:selectOneMenu value="#{usersBean.user.lang}">
                        <f:selectItems value="#{supportedLocales}" var="loc" itemValue="#{loc}" itemLabel="#{loc}"/>
                    </p:selectOneMenu>
                    <h:outputText value="#{msgs.user_trader}" rendered="#{!usersBean.user.administrator}"/>
                    <h:panelGroup rendered="#{!usersBean.user.administrator}" id="traderPanel">
                        <p:inputText value="#{usersBean.user.traderFiscalNumber}" 
                                     label="#{msgs.user_trader}" >
                            <p:ajax event="blur" listener="#{usersBean.onChangeTrader}" update="traderPanel"/>
                        </p:inputText>
                        <h:inputText value="#{usersBean.trader.display}" disabled="true" rendered="#{usersBean.trader.id != null}" size="100"/>
                    </h:panelGroup>
                    <h:outputText value="#{msgs.login_password}" />
                    <h:panelGroup rendered="#{!usersBean.user.administrator}">
                        <p:inputText value="#{usersBean.user.password}" label="#{msgs.login_password}"/>
                        <p:commandButton value="#{msgs.user_generate_pwd}" icon="ui-icon-gear"
                                         title="#{msgs.user_generate_pwd}"
                                         action="#{usersBean.generatePassword}" update="itemPanel"/>
                    </h:panelGroup>
                    <p:password value="#{usersBean.user.password}" feedback="true"
                                promptLabel="#{msgs.user_password_prompt}"
                                weakLabel="#{msgs.user_password_weak}"
                                goodLabel="#{msgs.user_password_good}"
                                strongLabel="#{msgs.user_password_strong}"
                                label="#{msgs.login_password}"
                                rendered="#{usersBean.user.administrator}"/>
                    <h:outputText value="#{msgs.user_confirm_pwd}" rendered="#{usersBean.user.administrator}"/>
                    <p:password id="cp" value="#{usersBean.confirmPassword}" feedback="true"
                                promptLabel="#{msgs.user_password_prompt}"
                                weakLabel="#{msgs.user_password_weak}"
                                goodLabel="#{msgs.user_password_good}"
                                strongLabel="#{msgs.user_password_strong}"
                                label="#{msgs.user_confirm_pwd}"
                                rendered="#{usersBean.user.administrator}"/>

                    <p:commandButton icon="ui-icon-disk" title="#{msgs.save}" 
                                     action="#{usersBean.save}" update="@form :usersForm"
                                     value="#{msgs.save}"
                                     oncomplete="usersTable.clearFilters();"/>
                    <p:commandButton icon="ui-icon-close" title="#{msgs.cancel}" 
                                     action="#{usersBean.cancel}" update="@form"
                                     value="#{msgs.cancel}" immediate="true"
                                     oncomplete="usersTable.clearFilters();">
                        <p:resetInput target="itemPanel" />  
                    </p:commandButton>
                </h:panelGrid>
            </h:form>
        </p:panel>
        <p:panel>
            <h:form id="usersForm">
                <p:dataTable value="#{usersBean.data}" var="user" rows="10" lazy="true"
                             emptyMessage="#{msgs.no_records_found}" rowKey="#{user.id}"
                             paginator="true" paginatorPosition="bottom"
                             resizableColumns="true" widgetVar="usersTable" 
                             paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {CurrentPageReport} "
                             currentPageReportTemplate="#{msgs.records_no} {totalRecords}">
                    <f:facet name="header">#{msgs.users}</f:facet>
                    <p:ajax event="filter" update="@all"/>
                    <p:column headerText="#{msgs.login_username}" width="40"
                              style="white-space: normal" 
                              sortBy="username" filterBy="username" filterPosition="bottom">
                        <h:outputText value="#{user.username}"/>
                    </p:column>
                    <p:column headerText="#{msgs.user_name}" width="50"
                              style="white-space: normal"
                              sortBy="name" filterBy="name">
                        <h:outputText value="#{user.name}"/>
                    </p:column>
                    <p:column headerText="#{msgs.user_trader}" width="70"
                              style="white-space: normal"
                              sortBy="traderFiscalNumber" filterBy="traderFiscalNumber">
                        <h:outputText value="#{user.traderFiscalNumber}"/>
                    </p:column>
                    <p:column headerText="#{msgs.user_language}" width="40"
                              style="white-space: normal"
                              sortBy="lang" filterBy="lang">
                        <h:outputText value="#{user.lang}"/>
                    </p:column>
                    <p:column headerText="#{msgs.user_admin}" width="50"
                              sortBy="administrator">
                        <h:selectBooleanCheckbox value="#{user.administrator}" disabled="true"/>
                    </p:column>
                    <p:column headerText="#{msgs.user_active}" width="30">
                        <h:selectBooleanCheckbox value="#{user.active}" disabled="true"/>
                    </p:column>

                    <p:column width="20">
                        <p:commandButton icon="ui-icon-pencil" 
                                         title="#{msgs.edit}" 
                                         action="#{usersBean.edit(user)}" 
                                         update=":userForm"
                                         style="width: 20px; height: 20px"/>
                    </p:column>
                    <p:column width="20">
                        <p:commandButton icon="ui-icon-close" 
                                         title="#{msgs.user_deactivate}" 
                                         action="#{usersBean.deactivate(user)}"
                                         rendered="#{user.active}"
                                         update="@form :userForm"
                                         style="width: 20px; height: 20px"/>
                        <p:commandButton icon="ui-icon-check" 
                                         title="#{msgs.user_activate}" 
                                         action="#{usersBean.activate(user)}"
                                         rendered="#{!user.active}"
                                         update="@form :userForm"
                                         style="width: 20px; height: 20px"/>
                    </p:column>
                </p:dataTable>
            </h:form>
        </p:panel>
    </ui:define>

    <ui:define name="helpContent">

        <p:panel header="#{msgs.home_help_header}">

            <p:panelGrid styleClass="no_border_grid">

                <p:row>
                    <p:column>
                        <h:outputText value="#{msgs.pageActions}" style="font-weight: bold;"/>
                    </p:column>
                </p:row>

                <p:row>
                    <p:column>
                        <h:outputText value="#{msgs.user_generate_pwd}" style="font-weight: bold;"/>
                    </p:column>
                    <p:column>
                        <h:outputText value="- #{msgs.admin_help_generate_password}"/>
                    </p:column>
                </p:row>


                <p:row rendered="#{sessionData.admin}">
                    <p:column>
                        <span class="ui-icon ui-icon-pencil ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="- #{msgs.admin_help_user_edit}"/>
                    </p:column>
                </p:row>
                <p:row rendered="#{sessionData.admin}">
                    <p:column>
                        <span class="ui-icon ui-icon-close ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="- #{msgs.admin_help_user_deactivate}"/>
                    </p:column>
                </p:row>
                <p:row rendered="#{sessionData.admin}">
                    <p:column>
                        <span class="ui-icon ui-icon-check ui-corner-all ui-state-default"></span>
                    </p:column>
                    <p:column>
                        <h:outputText value="- #{msgs.admin_help_user_activate}"/>
                    </p:column>
                </p:row>

            </p:panelGrid>

            <!-- Admin help -->
            <ui:include src="../help.xhtml"/>

        </p:panel>
    </ui:define>

</ui:composition>
