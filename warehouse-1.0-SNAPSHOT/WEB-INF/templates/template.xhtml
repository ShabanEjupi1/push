<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:snt="http://java.sun.com/jsf/composite/snt">
    <f:view contentType="text/html" locale="#{sessionData.locale}">
        <h:head>
            <link rel="shortcut icon" href="#{resource['images/logo_favicon.gif']}" type="image/x-icon" />
            
            <title><ui:insert name="title">#{msgs.app_name}</ui:insert></title>
            <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
            <meta http-equiv="cache-control" content="no-cache"/>
            <h:outputStylesheet library="css" name="default.css"/>
        </h:head>
        <h:body>
            <p:growl id="growl" autoUpdate="true" sticky="false"/>
            <f:loadBundle var="versionMsgs" basename="mk.com.snt.kc.warehouse.version"/>

            <p:layout fullPage="true" >

                <!-- TOP -->
                <p:layoutUnit position="north" size="125" 
                              style="border: none !important; background: none repeat scroll 0 0 #DBDBDB;">  

                    <div id="top_wrapper">   

                        <h:panelGroup id="mainMenuPanel">

                            <h:panelGrid columns="3" columnClasses="column_left, column_left"
                                         cellpadding="0" cellspacing="0">

                                <h:graphicImage value="#{resource['images:logo_vlada.gif']}" height="60" style="margin-left: 0;" />

                                <h:graphicImage value="#{resource['images:logo-al.png']}" height="60" style="margin-left: 8px;" />

                                <p:panelGrid style="margin-top: 10px; width: auto;"
                                             styleClass="template_header_panel"
                                             columnClasses="column_left, column_right" >
                                    <p:row>
                                        <p:column>
                                            <ui:insert name="headerTitle">
                                                <snt:headerTitle value="#{msgs.app_name}"/>                                                    
                                            </ui:insert>
                                        </p:column>
                                        <p:column styleClass="user_logged_in">
                                            <h:outputText value="#{sessionData.currentUserDisplay}" 
                                                          rendered="#{sessionData.authenticated}"/>
                                        </p:column>
                                    </p:row>
                                    <p:row>
                                        <p:column colspan="2">
                                            <p:separator />
                                        </p:column>
                                    </p:row>
                                    <p:row rendered="#{sessionData.authenticated}">
                                        <p:column colspan="2">
                                            <h:form id="toolbarForm">
                                                <ui:insert name="mainMenu"/>
                                            </h:form>
                                        </p:column>
                                    </p:row>
                                     <p:row rendered="#{sessionData.authenticated and !sessionData.admin}" >
                                         <p:column colspan="2">
                                            <p:separator />
                                        </p:column>
                                    </p:row>
                                    <p:row rendered="#{sessionData.authenticated and !sessionData.admin}" >
                                        <p:column styleClass="user_logged_in">
                                            <h:outputText value="#{msgs.warehouse_balance}:"/>
                                        </p:column>
                                        <p:column  styleClass="user_logged_in">
                                            <snt:outputDecimal value="#{warehouseBalanceBean.balance}"/>
                                        </p:column>
                                    </p:row>
                                </p:panelGrid>
                            </h:panelGrid>
                        </h:panelGroup>

                    </div>

                    <ui:insert name="upperMenu"/>
                    <!--<p:separator/>-->

                </p:layoutUnit>

                <!-- CENTER -->
                <p:layoutUnit position="center" style="border: none !important;">  

                    <h:panelGroup id="page" layout="block">
                        <f:facet name="last">
                            <h:outputStylesheet library="css" name="pf_overrides.css"/>
                        </f:facet>
                        <ui:insert name="content"/>
                    </h:panelGroup>

                </p:layoutUnit>

                <!-- SOUTH -->
                <p:layoutUnit position="south" style="background: #F8F8F8; font-weight: bold; border-top: 1px solid #E5E7EB !important; border-bottom: none !important; border-left: none !important; border-right: none !important;">  
                    <h:panelGroup styleClass="footer-scroll-container" layout="block">
                        <div style="min-height: 38px; display: flex; align-items: center; justify-content: center;">
                            <h:outputLabel value="version #{versionMsgs.version} @ Dogana e Kosovës" style="color: #6B7280; font-size: 12px; font-weight: 500; letter-spacing: 0.025em;"/>
                        </div>
                        <div style="min-height: 30px; display: flex; align-items: center; justify-content: center; margin-top: 5px;">
                            <span id="dev-signature">Shaban Ejupi</span>
                        </div>
                    </h:panelGroup>
                </p:layoutUnit>
            </p:layout>
            <ui:insert name="otherContent"/>

            <ui:insert name="status">
                <p:ajaxStatus style="width:32px;height:32px;display:block;position:fixed;right:50px;top:70px;">
                    <f:facet name="start">
                        <h:graphicImage value="/resources/images/ajax-loader.gif" />
                    </f:facet>
                    <f:facet name="complete">
                        <h:outputText value="" />
                    </f:facet>
                </p:ajaxStatus>
            </ui:insert>
            <p:dialog modal="true" widgetVar="statusDialog" header="#{msgs.pdf_download_status}" draggable="false" closable="false" resizable="false">  
                <p:graphicImage value="/resources/images/ajaxloadingbar.gif" />  
            </p:dialog>  
            <script type="text/javascript">
                function start() {
                    statusDialog.show();
                }

                function stop() {
                    statusDialog.hide();
                }
            </script>  
            <p:confirmDialog global="true">  
                <p:commandButton value="#{msgs.ok}" type="button" styleClass="ui-confirmdialog-yes" icon="ui-icon-check"/>  
                <p:commandButton value="#{msgs.cancel}" type="button" styleClass="ui-confirmdialog-no" icon="ui-icon-close"/>       
            </p:confirmDialog>  
        </h:body>

        <p:dialog widgetVar="userDlg" modal="true" header="#{msgs.user}">


            <h:form id="userProfileForm">

                <f:validateBean disabled="true">

                    <h:panelGrid columns="2">
                        <h:outputText value="#{msgs.login_username}"/>                        
                        <p:inputText value="#{sessionData.currentUsername}" disabled="true"/>                        
                        <h:outputText value="#{msgs.user_name}"/>
                        <p:inputText value="#{userProfileBean.name}" label="#{msgs.user_name}"/>                        
                        <h:outputText value="#{msgs.user_language}"/>
                        <p:selectOneMenu value="#{userProfileBean.lang}">                            
                            <f:selectItems value="#{supportedLocales}" var="loc" itemValue="#{loc}" itemLabel="#{loc}"/>
                        </p:selectOneMenu>
                        <h:outputText value="#{msgs.login_password}"/>
                        <p:password value="#{userProfileBean.password}" feedback="true"
                                    promptLabel="#{msgs.user_password_prompt}"
                                    weakLabel="#{msgs.user_password_weak}"
                                    goodLabel="#{msgs.user_password_good}"
                                    strongLabel="#{msgs.user_password_strong}"
                                    label="#{msgs.login_password}"/>
                        <h:outputText value="#{msgs.user_confirm_pwd}"/>
                        <p:password id="cp" value="#{userProfileBean.confirmPassword}" feedback="true"
                                    promptLabel="#{msgs.user_password_prompt}"
                                    weakLabel="#{msgs.user_password_weak}"
                                    goodLabel="#{msgs.user_password_good}"
                                    strongLabel="#{msgs.user_password_strong}"
                                    label="#{msgs.user_confirm_pwd}"/>
                        <p:commandButton icon="ui-icon-disk" title="#{msgs.save}" 
                                         action="#{userProfileBean.save}" update=":mainMenuPanel"
                                         value="#{msgs.save}"
                                         oncomplete="onUserProfileSave(xhr, status, args)"/>
                        <p:commandButton icon="ui-icon-close" title="#{msgs.cancel}" 
                                         oncomplete="userDlg.hide();"
                                         value="#{msgs.cancel}" immediate="true"/>
                    </h:panelGrid>
                </f:validateBean>
            </h:form>
        </p:dialog>
        <script type="text/javascript">
            function onUserProfileSave(xhr, status, args) {
                if (!args.invalid) {
                    userDlg.hide();
                }
            }
        </script>
        <p:dialog widgetVar="helpDlg" header="#{msgs.help}">
            <ui:insert name="helpContent"/>
        </p:dialog>
    </f:view>
</html>
